server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
        application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback: serve index.html for any path that isn't a real asset.
    # Disable HTML caching so a redeploy is picked up on the next request —
    # ``index.html`` is the entry that maps to the current hashed asset
    # bundle, and a stale copy keeps the browser loading the previous
    # bundle even after the image is rebuilt.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, must-revalidate" always;
        expires off;
    }

    # Long-cache hashed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API + WebSocket to the backend service.
    location /api/ {
        proxy_pass http://backend:8877;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass http://backend:8877;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
