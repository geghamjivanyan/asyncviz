name: asyncviz

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: dev
    image: asyncviz-backend:dev
    container_name: asyncviz-backend
    networks: [asyncviz]
    ports:
      - "${ASYNCVIZ_PORT:-8877}:8877"
    environment:
      ASYNCVIZ_HOST: "0.0.0.0"
      ASYNCVIZ_PORT: "8877"
      ASYNCVIZ_OPEN_BROWSER: "false"
      ASYNCVIZ_DEBUG: "${ASYNCVIZ_DEBUG:-false}"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./asyncviz:/app/asyncviz:cached
      - ./pyproject.toml:/app/pyproject.toml:ro
    init: true
    stop_grace_period: 10s
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8877/api/health',timeout=2).status==200 else 1)"
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: dev
    image: asyncviz-frontend:dev
    container_name: asyncviz-frontend
    networks: [asyncviz]
    ports:
      - "${VITE_PORT:-5173}:5173"
    environment:
      VITE_RUNTIME_WS_URL: "${VITE_RUNTIME_WS_URL:-ws://localhost:8877/ws}"
      BACKEND_URL: "http://backend:8877"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app:cached
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    init: true
    stop_grace_period: 5s
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173/ || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 5

networks:
  asyncviz:
    driver: bridge

volumes:
  frontend_node_modules:
